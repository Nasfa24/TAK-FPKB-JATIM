<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Transparansi Kas - TAK FPKB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 flex flex-col">

  <div class="bg-pkb text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10 border-b-4 border-pkb-dark">
    <button onclick="window.location.href='dashboard_tak.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition shadow-sm">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold">Transparansi Keuangan</h1>
  </div>

  <div class="px-4 mt-6">
    
    <div class="bg-white rounded-2xl shadow-md p-5 border-t-4 border-pkb mb-5">
      <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Cek Tagihan Kas Pribadi</label>
      <div class="flex gap-2">
        <input type="month" id="inputBulan" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none font-bold text-gray-700">
        <button onclick="muatDataKas()" class="bg-pkb hover:bg-pkb-dark text-white px-4 py-2 rounded-lg font-bold shadow-sm">Cek</button>
      </div>
    </div>

    <div id="boxUpload" class="hidden bg-white rounded-2xl shadow-md p-5 border border-gray-200 mb-5 relative overflow-hidden">
      <div class="absolute top-0 right-0 bg-blue-100 text-blue-700 text-[10px] px-3 py-1 font-bold rounded-bl-lg">Form Setoran</div>
      <h3 class="font-bold text-gray-800 text-sm mb-3">Upload Bukti Transfer <span id="labelBulanForm" class="text-pkb"></span></h3>
      
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition cursor-pointer relative">
        <input type="file" id="fileBukti" accept="image/*,application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
        <svg class="mx-auto h-8 w-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        <p class="text-xs text-gray-500 font-semibold" id="namaFileTxt">Klik/Tap untuk memilih Foto/PDF</p>
      </div>
      <button id="btnUpload" onclick="uploadBuktiKas()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded-lg shadow-sm mt-3 text-sm">
        Kirim Bukti Transfer
      </button>
    </div>

    <div id="boxTagihan" class="hidden mb-8">
      <h3 class="font-bold text-gray-700 text-sm mb-3 px-1">Status Pembayaran Tagihan</h3>
      <div id="listKas" class="space-y-3"></div>
    </div>


    <div class="mt-8 border-t-2 border-dashed border-gray-300 pt-6">
      <h3 class="font-bold text-gray-800 text-base mb-3 px-1 flex justify-between items-center">
        Buku Kas Organisasi
        <span class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded font-bold animate-pulse">🔴 LIVE</span>
      </h3>

      <div class="bg-white rounded-2xl shadow-lg p-5 border-t-4 border-emerald-500">
        <div class="text-center mb-5 pb-4 border-b border-gray-100">
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Saldo Kas Saat Ini</p>
          <h3 id="saldoUtama" class="text-3xl font-black text-emerald-600">Rp 0</h3>
        </div>

        <p class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">10 Transaksi Terakhir</p>
        
        <div id="listRiwayatLive" class="space-y-3 max-h-64 overflow-y-auto pr-2">
          <div class="text-center text-gray-400 text-xs py-5">Memuat buku kas...</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxFMGDcYC1_C6z9nojL1IykVxFQsN7FJDVpi0twn2skuOsHPmC2lpuhkAa5ieLyYi-5/exec";

    let currentUser = localStorage.getItem('tak_username');
    if (!currentUser) { window.location.href = "index.html"; }

    let noKontrakGlobal = "";
    let namaLengkapGlobal = localStorage.getItem('tak_nama') || currentUser;

    const namaBulanIndo = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];

    function formatRp(angka) {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      let now = new Date();
      let month = (now.getMonth() + 1).toString().padStart(2, '0');
      document.getElementById('inputBulan').value = `${now.getFullYear()}-${month}`;
      
      let doc = await db.collection("Users").doc(currentUser).get();
      if(doc.exists && doc.data().no_kontrak) { noKontrakGlobal = doc.data().no_kontrak; }

      document.getElementById('fileBukti').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
          document.getElementById('namaFileTxt').innerText = e.target.files[0].name;
          document.getElementById('namaFileTxt').classList.add('text-pkb');
        }
      });

      // AKTIFKAN MATA DEWA BUKU KAS
      pantauBukuKasLive();
    });

    // ==========================================
    // MESIN LIVE UPDATE BUKU KAS UNTUK TAK
    // ==========================================
    function pantauBukuKasLive() {
      db.collection("Kas_Transaksi").orderBy("waktu_input", "desc").onSnapshot((snapshot) => {
        let totalM = 0;
        let totalK = 0;
        let htmlRiwayat = "";
        let count = 0;

        snapshot.forEach(doc => {
          let data = doc.data();
          
          // Kalkulasi seluruh saldo
          if (data.tipe === "Masuk") { totalM += parseInt(data.nominal); } 
          else { totalK += parseInt(data.nominal); }

          // Tampilkan hanya 10 transaksi terakhir agar HP tidak berat
          if(count < 10) {
            let tglStr = data.tanggal.split("-").reverse().join("-");
            let isMasuk = data.tipe === "Masuk";
            let warnaKiri = isMasuk ? "border-blue-500" : "border-red-500";
            let warnaNominal = isMasuk ? "text-blue-600" : "text-red-600";
            let icon = isMasuk ? "+" : "-";

            let linkKwitansi = data.file_url ? `<a href="${data.file_url}" target="_blank" class="text-emerald-500 text-[9px] font-bold hover:underline flex items-center gap-1 mt-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> Cek Nota</a>` : "";

            htmlRiwayat += `
              <div class="bg-gray-50 rounded-xl p-3 border-l-4 ${warnaKiri} flex justify-between items-start">
                <div>
                  <p class="text-[10px] text-gray-400 font-bold">${tglStr}</p>
                  <p class="font-bold text-gray-700 text-xs mt-0.5">${data.keterangan}</p>
                  ${linkKwitansi}
                </div>
                <div class="text-right ml-2">
                  <p class="text-sm font-black ${warnaNominal}">${icon}${formatRp(data.nominal)}</p>
                </div>
              </div>
            `;
            count++;
          }
        });

        // Tampilkan Saldo
        document.getElementById('saldoUtama').innerText = formatRp(totalM - totalK);
        
        if (snapshot.empty) {
          document.getElementById('listRiwayatLive').innerHTML = `<div class="text-center text-gray-400 text-xs py-5">Belum ada transaksi kas tercatat.</div>`;
        } else {
          document.getElementById('listRiwayatLive').innerHTML = htmlRiwayat;
        }
      }, (error) => {
        console.log("Error mengambil data kas live:", error);
      });
    }

    // ==========================================
    // MESIN CEK TAGIHAN KAS PRIBADI (GSHEETS)
    // ==========================================
    async function muatDataKas() {
      let rawBulan = document.getElementById('inputBulan').value; 
      if(!rawBulan) return;

      let parts = rawBulan.split("-");
      let bulanTahunGsheet = parts[1] + "-" + parts[0]; 
      let namaBulanStr = namaBulanIndo[parseInt(parts[1]) - 1] + " " + parts[0]; 

      document.getElementById('labelBulanForm').innerText = namaBulanStr;
      document.getElementById('boxUpload').classList.remove('hidden');
      document.getElementById('boxTagihan').classList.remove('hidden');

      let listContainer = document.getElementById('listKas');
      listContainer.innerHTML = `<div class="text-center text-gray-500 text-sm py-10 bg-white rounded-xl shadow border border-gray-200">Mengambil data dari server...</div>`;

      try {
        let response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "getTransparansiKas", bulanTahun: bulanTahunGsheet })
        });
        
        let resData = await response.json();
        
        if(resData.status !== "success" || resData.data.length === 0) {
          listContainer.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow text-center border border-gray-200"><p class="text-gray-500 font-bold text-sm">Belum ada data tagihan Kas untuk bulan ini.</p></div>`;
          return;
        }

        let htmlList = "";
        let dataBulanIni = resData.data;

        dataBulanIni.forEach(item => {
          let isLunas = item.status.toString().toLowerCase().includes("lunas");
          let badgeColor = isLunas ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700";
          let totalRp = formatRp(item.total);

          let borderStyle = (item.username === currentUser) ? "border-l-4 border-pkb bg-green-50" : "border border-gray-200 bg-white";
          let labelAnda = (item.username === currentUser) ? `<span class="bg-pkb text-white text-[9px] px-2 py-0.5 rounded-full uppercase ml-2">Anda</span>` : "";

          htmlList += `
            <div class="rounded-xl shadow-sm p-4 flex justify-between items-center ${borderStyle}">
              <div>
                <p class="font-bold text-gray-800 text-sm mb-1">${item.nama} ${labelAnda}</p>
                <div class="flex items-center gap-2">
                  <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase ${badgeColor}">${item.status}</span>
                </div>
              </div>
              <div class="text-right">
                <p class="text-lg font-black text-gray-700">${totalRp}</p>
                <p class="text-[9px] text-gray-400 font-bold uppercase">Total Tagihan</p>
              </div>
            </div>
          `;
        });

        listContainer.innerHTML = htmlList;

      } catch (error) {
        listContainer.innerHTML = `<div class="text-center text-red-500 font-bold text-sm py-10 bg-white rounded-xl shadow border border-gray-200">Gagal terhubung ke GSheets.</div>`;
      }
    }

    // ==========================================
    // MESIN UPLOAD BUKTI TRANSFER
    // ==========================================
    async function uploadBuktiKas() {
      let fileInput = document.getElementById('fileBukti');
      let rawBulan = document.getElementById('inputBulan').value;
      
      if (fileInput.files.length === 0) { Swal.fire('Oops!', 'Pilih file bukti transfer (Foto/PDF) dulu.', 'warning'); return; }
      if (!rawBulan) { Swal.fire('Oops!', 'Pilih bulan setoran dulu.', 'warning'); return; }

      let file = fileInput.files[0];
      let maxSize = 5 * 1024 * 1024; 
      if (file.size > maxSize) { Swal.fire('File Terlalu Besar', 'Maksimal ukuran file adalah 5MB.', 'error'); return; }

      let parts = rawBulan.split("-");
      let namaBulanStr = namaBulanIndo[parseInt(parts[1]) - 1] + " " + parts[0]; 

      let btn = document.getElementById('btnUpload');
      btn.innerHTML = 'Mengunggah ke GDrive...';
      btn.disabled = true;
      btn.classList.replace('bg-blue-500', 'bg-gray-400');

      let reader = new FileReader();
      reader.onload = async function() {
        let base64 = reader.result.split(',')[1];
        let payload = {
          action: "uploadKas",
          base64: base64,
          mimeType: file.type,
          fileName: file.name,
          bulanTahunNama: namaBulanStr,
          noKontrak: noKontrakGlobal || "0000",
          namaLengkap: namaLengkapGlobal
        };

        try {
          let response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
          let result = await response.json();

          if (result.status === "success") {
            Swal.fire('Terkirim!', 'Bukti transfer berhasil diunggah. Menunggu konfirmasi Bendahara.', 'success');
            document.getElementById('namaFileTxt').innerText = "Klik/Tap untuk memilih Foto/PDF";
            document.getElementById('namaFileTxt').classList.remove('text-pkb');
            fileInput.value = "";
          } else { throw new Error(result.message); }
        } catch (err) {
          Swal.fire('Gagal Upload', err.toString(), 'error');
        } finally {
          btn.innerHTML = 'Kirim Bukti Transfer';
          btn.disabled = false;
          btn.classList.replace('bg-gray-400', 'bg-blue-500');
        }
      };
      reader.onerror = function() {
        Swal.fire('Error', 'Gagal membaca file', 'error');
        btn.innerHTML = 'Kirim Bukti Transfer'; btn.disabled = false; btn.classList.replace('bg-gray-400', 'bg-blue-500');
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
