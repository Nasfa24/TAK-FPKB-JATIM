<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Verifikasi Laporan Fisik - Koordinator FPKB</title>
  <meta name="theme-color" content="#059669">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 flex flex-col">

  <div class="bg-gray-800 text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10 border-b-4 border-pkb-light">
    <button onclick="window.location.href='dashboard_koordinator.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold text-pkb-light">Verifikasi Laporan Fisik</h1>
  </div>

  <div class="px-4 mt-6">
    <div class="bg-white rounded-xl shadow p-4 mb-4 border border-gray-200">
      <p class="text-xs text-gray-500 mb-2">Pilih Bulan Laporan yang ingin dicek:</p>
      <input type="month" id="filterBulan" onchange="loadLaporan()" class="w-full px-3 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-pkb outline-none font-bold text-gray-700">
    </div>

    <div class="flex justify-between items-center mb-4 px-1">
      <h2 class="font-bold text-gray-700 text-sm">Menunggu Fisik / Hardcopy</h2>
      <span id="badgeCount" class="bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
    </div>

    <div id="listLaporan" class="space-y-4">
      <div class="text-center text-gray-500 text-sm py-10">Pilih bulan laporan terlebih dahulu.</div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = localStorage.getItem('tak_username');
    let currentRole = localStorage.getItem('tak_role') || "";
    if (!currentUser || !currentRole.toLowerCase().includes('koordinator')) { window.location.href = "index.html"; }

    // Set default filter ke bulan ini
    document.addEventListener("DOMContentLoaded", () => {
      let now = new Date();
      let month = (now.getMonth() + 1).toString().padStart(2, '0');
      document.getElementById('filterBulan').value = `${now.getFullYear()}-${month}`;
      loadLaporan();
    });

    async function loadLaporan() {
      const listContainer = document.getElementById('listLaporan');
      const blnValue = document.getElementById('filterBulan').value;
      if(!blnValue) return;

      listContainer.innerHTML = `<div class="text-center text-gray-500 text-sm py-10">Memuat data...</div>`;

      try {
        // Cari laporan di bulan tersebut yang fisiknya belum diterima
        let snapshot = await db.collection("Laporan_Kinerja")
                               .where("bulan_tahun", "==", blnValue)
                               .where("status_diterima", "==", "Belum Diterima")
                               .get();
        
        document.getElementById('badgeCount').innerText = snapshot.size;
        listContainer.innerHTML = "";

        if (snapshot.empty) {
          listContainer.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow text-center border border-gray-200"><p class="text-gray-500 font-bold text-sm">Semua fisik laporan bulan ini sudah beres!</p></div>`;
          return;
        }

        snapshot.forEach(doc => {
          let data = doc.data();
          let docId = doc.id;
          let tglUpload = data.waktu_upload ? data.waktu_upload.toDate().toLocaleDateString('id-ID') : "-";
          
          let badgeTelat = data.status_digital === "Tepat Waktu" ? 
            `<span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Tepat Waktu</span>` :
            `<span class="bg-red-100 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Terlambat</span>`;

          listContainer.innerHTML += `
            <div class="bg-white rounded-2xl shadow-md p-4 border-l-4 border-orange-500">
              <div class="flex justify-between items-start mb-1">
                <h3 class="font-bold text-gray-800 text-base">${data.nama}</h3>
                ${badgeTelat}
              </div>
              <p class="text-xs text-gray-500 mb-3">Tgl Upload Digital: ${tglUpload}</p>

              <a href="${data.file_url}" target="_blank" class="text-blue-500 hover:text-blue-700 text-xs font-bold flex items-center gap-1 mb-4 bg-blue-50 p-2 rounded w-fit">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                ${data.nama_file}
              </a>

              <button onclick="terimaFisik('${docId}', '${data.nama}')" class="w-full bg-orange-500 hover:bg-orange-600 text-white text-sm font-bold py-2.5 rounded-lg transition shadow-sm flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Terima Fisik (Sah 100%)
              </button>
            </div>
          `;
        });
      } catch (error) {
        listContainer.innerHTML = `<div class="text-center text-red-500 font-bold">Gagal memuat data: ${error.message}</div>`;
      }
    }

    async function terimaFisik(docId, namaUser) {
      Swal.fire({
        title: 'Verifikasi Fisik',
        text: `Apakah Anda sudah menerima hardcopy laporan dari ${namaUser}?`,
        icon: 'question', showCancelButton: true,
        confirmButtonColor: '#f97316', confirmButtonText: 'Ya, Sudah Diterima'
      }).then(async (result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
          try {
            await db.collection("Laporan_Kinerja").doc(docId).update({ status_diterima: "Sudah Diterima" });
            Swal.fire('Sah!', `Laporan fisik ${namaUser} telah terverifikasi.`, 'success');
            loadLaporan(); // Refresh
          } catch (error) {
            Swal.fire('Gagal', error.message, 'error');
          }
        }
      })
    }
  </script>
</body>
</html>
