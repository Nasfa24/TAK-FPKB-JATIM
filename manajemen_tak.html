<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manajemen TAK - Koordinator FPKB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 flex flex-col">

  <div class="bg-gray-800 text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10 border-b-4 border-yellow-500">
    <button onclick="window.location.href='dashboard_koordinator.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold text-yellow-400">Manajemen Anggota TAK</h1>
  </div>

  <div class="px-4 mt-6">
    <div class="bg-white rounded-2xl shadow-md p-5 border-t-4 border-yellow-500 mb-4">
      <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Cari Username TAK</label>
      <div class="flex gap-2">
        <input type="text" id="inputCari" placeholder="Contoh: uuth" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none text-sm lowercase">
        <button onclick="cariUser()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg font-bold transition shadow-sm">Cari</button>
      </div>
    </div>

    <div id="hasilPencarian" class="hidden bg-white rounded-2xl shadow-md p-5 border-t-2 border-gray-200">
      <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">Informasi Profil</h3>
      
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-500">Nama Lengkap</label>
          <input type="text" id="editNama" class="w-full font-bold px-3 py-2 border-b border-gray-300 focus:border-yellow-500 outline-none bg-gray-50">
        </div>
        <div>
          <label class="block text-xs text-gray-500">Pendamping Dewan (TA)</label>
          <input type="text" id="editDewan" class="w-full font-bold px-3 py-2 border-b border-gray-300 focus:border-yellow-500 outline-none bg-gray-50">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-gray-500">No Kontrak</label>
            <input type="text" id="editKontrak" class="w-full font-bold text-blue-600 px-3 py-2 border-b border-gray-300 focus:border-yellow-500 outline-none bg-gray-50">
          </div>
          <div>
            <label class="block text-xs text-gray-500">Saldo Poin</label>
            <input type="number" id="editPoin" class="w-full font-black text-2xl text-pkb px-3 py-2 border-b border-gray-300 focus:border-yellow-500 outline-none bg-yellow-50">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-6">
        <button onclick="simpanProfil()" class="bg-pkb hover:bg-pkb-dark text-white font-bold py-2 rounded-lg shadow-sm">Simpan Data</button>
        <button onclick="infoResetPassword()" class="bg-gray-800 hover:bg-black text-white font-bold py-2 rounded-lg shadow-sm text-sm">Reset Sandi</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = localStorage.getItem('tak_username');
    let currentRole = localStorage.getItem('tak_role') || "";
    if (!currentUser || !currentRole.toLowerCase().includes('koordinator')) { window.location.href = "index.html"; }

    let userSedangDiedit = "";

    async function cariUser() {
      let username = document.getElementById('inputCari').value.trim().toLowerCase();
      if(!username) return;

      Swal.fire({ title: 'Mencari Data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

      try {
        let doc = await db.collection("Users").doc(username).get();
        if (!doc.exists) throw new Error("Username tidak ditemukan di database.");

        let data = doc.data();
        userSedangDiedit = username;

        document.getElementById('editNama').value = data.nama || "";
        document.getElementById('editDewan').value = data.dewan || "";
        document.getElementById('editKontrak').value = data.no_kontrak || "";
        document.getElementById('editPoin').value = data.poin || 0;

        document.getElementById('hasilPencarian').classList.remove('hidden');
        Swal.close();
      } catch (error) {
        document.getElementById('hasilPencarian').classList.add('hidden');
        Swal.fire('Oops!', error.message, 'error');
      }
    }

    async function simpanProfil() {
      if(!userSedangDiedit) return;
      
      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

      try {
        await db.collection("Users").doc(userSedangDiedit).update({
          nama: document.getElementById('editNama').value,
          dewan: document.getElementById('editDewan').value,
          no_kontrak: document.getElementById('editKontrak').value,
          poin: parseInt(document.getElementById('editPoin').value)
        });

        Swal.fire('Berhasil!', 'Profil dan Poin berhasil diperbarui.', 'success');
      } catch (error) {
        Swal.fire('Gagal', error.message, 'error');
      }
    }

    function infoResetPassword() {
      Swal.fire({
        icon: 'info',
        title: 'Prosedur Keamanan',
        html: `Sistem Firebase mengenkripsi kata sandi tingkat tinggi.<br><br>Untuk me-reset sandi <b>${userSedangDiedit}</b>, Admin harus melakukannya melalui <b>Firebase Console > Authentication</b>.`,
        confirmButtonColor: '#059669',
        confirmButtonText: 'Mengerti'
      });
    }
  </script>
</body>
</html>
