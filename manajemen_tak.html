<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manajemen TAK - Koordinator FPKB</title>
  <meta name="theme-color" content="#059669">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 flex flex-col">

  <div class="bg-gray-800 text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10 border-b-4 border-yellow-500">
    <button onclick="window.location.href='dashboard_koordinator.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold text-yellow-400">Manajemen Anggota TAK</h1>
  </div>

  <div class="px-4 mt-6">
    <div class="bg-white rounded-2xl shadow-md p-5 border-t-4 border-yellow-500 mb-4 relative">
      <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Cari Nama Anggota TAK</label>
      <input type="text" id="inputCari" onkeyup="filterPencarian()" placeholder="Ketik nama (contoh: Nasfa)..." autocomplete="off" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none text-sm font-semibold text-gray-700">
      
      <div id="dropdownCari" class="hidden absolute left-0 right-0 mt-1 mx-5 bg-white border border-gray-200 rounded-lg shadow-xl z-50 max-h-48 overflow-y-auto">
        </div>
    </div>

    <div id="hasilPencarian" class="hidden bg-white rounded-2xl shadow-md p-5 border-t-2 border-gray-200">
      <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">Informasi Profil Lengkap</h3>
      
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase">Username (Tidak Bisa Diedit)</label>
          <input type="text" id="editUsername" disabled class="w-full font-bold px-3 py-2 border border-gray-200 bg-gray-100 rounded text-gray-500">
        </div>
        <div>
          <label class="block text-xs text-gray-500 font-bold uppercase">Nama Lengkap</label>
          <input type="text" id="editNama" class="w-full font-bold px-3 py-2 border-b-2 border-gray-300 focus:border-yellow-500 outline-none bg-gray-50 text-gray-800">
        </div>
        <div>
          <label class="block text-xs text-gray-500 font-bold uppercase">Pendamping Dewan (TA)</label>
          <input type="text" id="editDewan" class="w-full font-bold px-3 py-2 border-b-2 border-gray-300 focus:border-yellow-500 outline-none bg-gray-50 text-gray-800">
        </div>
        
        <div class="grid grid-cols-2 gap-4 pt-2">
          <div>
            <label class="block text-xs text-gray-500 font-bold uppercase">Role Akses</label>
            <select id="editRole" class="w-full font-bold px-3 py-2 border-b-2 border-gray-300 focus:border-yellow-500 outline-none bg-gray-50 text-gray-800 text-sm">
              <option value="TAK">TAK</option>
              <option value="Koordinator">Koordinator</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-bold uppercase">No Kontrak</label>
            <input type="text" id="editKontrak" class="w-full font-bold text-blue-600 px-3 py-2 border-b-2 border-gray-300 focus:border-yellow-500 outline-none bg-gray-50">
          </div>
        </div>

        <div class="pt-2">
          <label class="block text-xs text-gray-500 font-bold uppercase">Saldo Poin Kedisiplinan</label>
          <input type="number" id="editPoin" class="w-full font-black text-3xl text-pkb px-3 py-2 border-b-2 border-gray-300 focus:border-yellow-500 outline-none bg-yellow-50 text-center rounded-lg mt-1">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-6">
        <button onclick="simpanProfil()" class="bg-pkb hover:bg-pkb-dark text-white font-bold py-3 rounded-lg shadow-sm">Simpan Data</button>
        <button onclick="infoResetPassword()" class="bg-gray-800 hover:bg-black text-white font-bold py-3 rounded-lg shadow-sm text-sm">Reset Sandi</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxFMGDcYC1_C6z9nojL1IykVxFQsN7FJDVpi0twn2skuOsHPmC2lpuhkAa5ieLyYi-5/exec";

    let currentUser = localStorage.getItem('tak_username');
    let currentRole = localStorage.getItem('tak_role') || "";
    if (!currentUser || !currentRole.toLowerCase().includes('koordinator')) { window.location.href = "index.html"; }

    let semuaDataUsers = []; 
    let userSedangDiedit = "";

    document.addEventListener("DOMContentLoaded", async function() {
      try {
        let snapshot = await db.collection("Users").get();
        snapshot.forEach(doc => {
          semuaDataUsers.push(doc.data());
        });
      } catch (error) {
        console.log("Gagal memuat database TAK", error);
      }
    });

    function filterPencarian() {
      let keyword = document.getElementById('inputCari').value.toLowerCase();
      let dropdown = document.getElementById('dropdownCari');
      
      dropdown.innerHTML = ""; 
      
      if (keyword.length < 2) {
        dropdown.classList.add('hidden');
        return; 
      }

      let hasilFilter = semuaDataUsers.filter(user => 
        (user.nama && user.nama.toLowerCase().includes(keyword)) || 
        (user.username && user.username.toLowerCase().includes(keyword))
      );

      if (hasilFilter.length > 0) {
        dropdown.classList.remove('hidden');
        hasilFilter.slice(0, 5).forEach(user => {
          let div = document.createElement('div');
          div.className = "px-4 py-3 border-b hover:bg-yellow-50 cursor-pointer";
          div.innerHTML = `<p class="font-bold text-sm text-gray-800">${user.nama}</p><p class="text-xs text-gray-500">ID: ${user.username} | Poin: ${user.poin}</p>`;
          div.onclick = function() { pilihUser(user); };
          dropdown.appendChild(div);
        });
      } else {
        dropdown.classList.remove('hidden');
        dropdown.innerHTML = `<div class="px-4 py-3 text-sm text-gray-500 italic">Nama tidak ditemukan.</div>`;
      }
    }

    function pilihUser(userObj) {
      document.getElementById('inputCari').value = userObj.nama;
      document.getElementById('dropdownCari').classList.add('hidden'); 
      
      userSedangDiedit = userObj.username;

      document.getElementById('editUsername').value = userObj.username;
      document.getElementById('editNama').value = userObj.nama || "";
      document.getElementById('editDewan').value = userObj.dewan || "";
      document.getElementById('editRole').value = userObj.role || "TAK";
      document.getElementById('editKontrak').value = userObj.no_kontrak || "";
      document.getElementById('editPoin').value = userObj.poin || 0;

      document.getElementById('hasilPencarian').classList.remove('hidden');
    }

    async function simpanProfil() {
      if(!userSedangDiedit) return;
      
      Swal.fire({ title: 'Menyimpan & Sinkronisasi...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

      let dataBaru = {
        nama: document.getElementById('editNama').value.trim(),
        dewan: document.getElementById('editDewan').value.trim(),
        role: document.getElementById('editRole').value,
        no_kontrak: document.getElementById('editKontrak').value.trim(),
        poin: parseInt(document.getElementById('editPoin').value)
      };

      try {
        await db.collection("Users").doc(userSedangDiedit).update(dataBaru);

        let payloadGAS = {
          action: "updateUserSheet",
          username: userSedangDiedit,
          namaLengkap: dataBaru.nama,
          namaDewan: dataBaru.dewan,
          role: dataBaru.role,
          noKontrak: dataBaru.no_kontrak,
          poin: dataBaru.poin
        };

        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(payloadGAS)
        }).catch(err => console.log("GSheets Update error: ", err)); 

        let index = semuaDataUsers.findIndex(u => u.username === userSedangDiedit);
        if(index !== -1) {
          semuaDataUsers[index] = { ...semuaDataUsers[index], ...dataBaru };
        }

        Swal.fire('Berhasil!', 'Data profil berhasil diperbarui di Firebase dan Google Sheets.', 'success');
      } catch (error) {
        Swal.fire('Gagal', error.message, 'error');
      }
    }

    // UPDATE: Penambahan pesan hubungi Koordinator
    function infoResetPassword() {
      Swal.fire({
        icon: 'info', title: 'Prosedur Keamanan',
        html: `Untuk me-reset kata sandi akun <b>${userSedangDiedit}</b>, Admin Pusat harus melakukannya melalui <b>Firebase Console > Authentication</b> demi keamanan enkripsi.<br><br><span class="text-red-500 font-bold">Silahkan hubungi Koordinator.</span>`,
        confirmButtonColor: '#059669', confirmButtonText: 'Mengerti'
      });
    }
  </script>
</body>
</html>
