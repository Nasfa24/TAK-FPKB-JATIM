<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard Koordinator - TAK FPKB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 hidden" id="mainBody">

  <div class="bg-gray-800 text-white pt-8 pb-16 px-6 rounded-b-3xl shadow-lg relative overflow-hidden">
    <div class="absolute top-0 right-0 opacity-10 pointer-events-none">
      <svg class="w-40 h-40 transform translate-x-10 -translate-y-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"></path></svg>
    </div>

    <div class="flex justify-between items-center mb-4 relative z-10">
      <h1 class="text-xl font-bold text-pkb-light">Ruang Kendali</h1>
      <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white text-xs px-4 py-2 rounded-full transition shadow-md font-bold">Keluar</button>
    </div>
    
    <div class="relative z-10">
      <p class="text-sm text-gray-400">Selamat bertugas,</p>
      <h2 id="namaKoordinator" class="text-2xl font-bold mt-1 tracking-wide text-white">Memuat...</h2>
      <p class="text-xs font-bold mt-2 bg-pkb inline-block px-3 py-1 rounded-md uppercase tracking-wider shadow-sm">KOORDINATOR TAK</p>
    </div>
  </div>

  <div class="px-6 -mt-8 relative z-20">
    <div class="bg-white rounded-2xl shadow-xl p-6 border-t-4 border-pkb flex flex-col">
      <h3 class="text-gray-800 font-bold mb-4 border-b pb-2">Buat Agenda Kegiatan Baru</h3>
      
      <form id="formJadwal" onsubmit="buatJadwalQR(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Jenis Kegiatan</label>
          <select id="inputJenis" required onchange="cekLainnya()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm bg-gray-50 font-semibold text-gray-700">
            <option value="">-- Pilih Jenis --</option>
            <option value="Rapat Rutin">Rapat Rutin</option>
            <option value="Piket Rutin">Piket Rutin</option>
            <option value="Upgrading Kapasitas Diri">Upgrading Kapasitas Diri</option>
            <option value="Lainnya">Kegiatan Lainnya...</option>
          </select>
        </div>

        <div id="boxLainnya" class="hidden">
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Sebutkan Nama Kegiatan</label>
          <input type="text" id="inputManual" placeholder="Ketik nama kegiatan di sini..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Tanggal</label>
            <input type="date" id="inputTanggal" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Jam Mulai</label>
            <input type="time" id="inputJam" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm">
          </div>
        </div>

        <button type="submit" id="btnBuat" class="w-full bg-pkb hover:bg-pkb-dark text-white py-3 rounded-lg font-bold transition shadow-md mt-2 flex justify-center items-center">
          Buat & Munculkan QR
        </button>
      </form>

      <div id="areaQR" class="hidden flex-col items-center w-full mt-6 pt-4 border-t border-dashed border-gray-300">
        <h4 id="judulQR" class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">QR Kegiatan Aktif</h4>
        <div class="bg-gray-50 p-4 rounded-2xl border-2 border-pkb shadow-inner flex justify-center bg-white">
          <img id="qrKegiatanImg" src="" alt="QR Kegiatan" class="w-48 h-48 object-cover">
        </div>
        <p id="labelKegiatan" class="text-sm font-bold text-pkb mt-3 tracking-widest uppercase text-center bg-green-50 px-3 py-1 rounded-md"></p>
        <div class="bg-blue-50 border border-blue-200 p-3 rounded-lg mt-4 w-full">
          <p class="text-xs text-blue-800 font-semibold text-center"><span class="font-bold">Info Kedisiplinan:</span> Absen dibuka 15 menit sebelum jam mulai, dan ditutup 3 jam setelahnya.</p>
        </div>
      </div>

    </div>
  </div>

  <div class="px-6 mt-8">
    <h3 class="text-gray-800 font-bold mb-4 px-1">Menu Operasional</h3>
    
    <div class="grid grid-cols-2 gap-4">
      <button onclick="window.location.href='scan_tak.html'" class="bg-white p-4 rounded-2xl shadow-md border-b-4 border-blue-500 hover:shadow-lg transition flex flex-col items-center justify-center text-center">
        <div class="bg-blue-50 text-blue-500 p-3 rounded-full mb-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg></div>
        <span class="text-xs font-bold text-gray-800">Scan TAK</span>
      </button>

      <button onclick="window.location.href='manajemen_tak.html'" class="bg-white p-4 rounded-2xl shadow-md border-b-4 border-yellow-500 hover:shadow-lg transition flex flex-col items-center justify-center text-center">
        <div class="bg-yellow-50 text-yellow-600 p-3 rounded-full mb-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
        <span class="text-xs font-bold text-gray-800">Data TAK</span>
      </button>

      <button onclick="window.location.href='validasi_izin.html'" class="bg-white p-4 rounded-2xl shadow-md border-b-4 border-red-500 hover:shadow-lg transition flex flex-col items-center justify-center text-center">
        <div class="bg-red-50 text-red-500 p-3 rounded-full mb-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg></div>
        <span class="text-xs font-bold text-gray-800">Validasi Izin</span>
      </button>

      <button onclick="window.location.href='verifikasi_laporan.html'" class="bg-white p-4 rounded-2xl shadow-md border-b-4 border-orange-500 hover:shadow-lg transition flex flex-col items-center justify-center text-center">
        <div class="bg-orange-50 text-orange-500 p-3 rounded-full mb-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
        <span class="text-xs font-bold text-gray-800">Cek Laporan</span>
      </button>

      <button onclick="window.location.href='rekap_data.html'" class="col-span-2 bg-white p-4 rounded-2xl shadow-md border-b-4 border-purple-500 hover:shadow-lg transition flex items-center justify-center gap-3">
        <div class="bg-purple-50 text-purple-500 p-2 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
        <span class="text-sm font-bold text-gray-800">Lihat Rekap Kehadiran</span>
      </button>

    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxFMGDcYC1_C6z9nojL1IykVxFQsN7FJDVpi0twn2skuOsHPmC2lpuhkAa5ieLyYi-5/exec";

    let currentUser = localStorage.getItem('tak_username');
    let currentRole = localStorage.getItem('tak_role') || "";
    
    if (!currentUser || !currentRole.toLowerCase().includes('koordinator')) {
      window.location.href = "index.html"; 
    } else {
      document.getElementById('mainBody').classList.remove('hidden');
      document.getElementById('namaKoordinator').innerText = localStorage.getItem('tak_nama');
    }

    document.addEventListener("DOMContentLoaded", async function() {
      let todayFormat = new Date().toLocaleDateString('en-CA'); 
      document.getElementById("inputTanggal").setAttribute("min", todayFormat);

      try {
        let snapshot = await db.collection("Jadwal_Kegiatan").orderBy("waktu_dibuat", "desc").limit(1).get();
        if (!snapshot.empty) {
          let jadwalTerbaru = snapshot.docs[0].data();
          document.getElementById('qrKegiatanImg').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + jadwalTerbaru.id_kegiatan;
          document.getElementById('labelKegiatan').innerText = jadwalTerbaru.jenis_kegiatan + " (" + jadwalTerbaru.id_kegiatan + ")";
          document.getElementById('judulQR').innerText = "Memuat Ulang QR Terakhir...";
          
          document.getElementById('areaQR').classList.remove('hidden');
          document.getElementById('areaQR').classList.add('flex');
        }
      } catch (error) {
        console.log("Belum ada riwayat kegiatan.", error);
      }
    });

    function cekLainnya() {
      let val = document.getElementById('inputJenis').value;
      if (val === "Lainnya") {
        document.getElementById('boxLainnya').classList.remove('hidden');
        document.getElementById('inputManual').required = true;
      } else {
        document.getElementById('boxLainnya').classList.add('hidden');
        document.getElementById('inputManual').required = false;
        document.getElementById('inputManual').value = "";
      }
    }

    async function buatJadwalQR(e) {
      e.preventDefault();
      
      let jenis = document.getElementById('inputJenis').value;
      if (jenis === "Lainnya") { jenis = document.getElementById('inputManual').value.trim(); }
      
      let tanggal = document.getElementById('inputTanggal').value;
      let jam = document.getElementById('inputJam').value;
      
      let tglDipilih = new Date(tanggal);
      let hariIni = new Date();
      hariIni.setHours(0,0,0,0); 

      if(tglDipilih < hariIni) {
        Swal.fire('Aksi Ditolak', 'Mesin Waktu dimatikan. Anda tidak bisa membuat kegiatan di masa lalu!', 'error');
        return;
      }

      let toleransi = "15 Menit"; 

      let tglPecah = tanggal.split("-"); 
      let kodeUnik = Math.floor(Math.random() * 900) + 100;
      let idKegiatan = `KEG-${tglPecah[2]}${tglPecah[1]}-${kodeUnik}`; 

      let btn = document.getElementById('btnBuat');
      btn.innerHTML = `Menyimpan Jadwal...`;
      btn.disabled = true;

      try {
        await db.collection("Jadwal_Kegiatan").doc(idKegiatan).set({
          id_kegiatan: idKegiatan,
          jenis_kegiatan: jenis,
          tanggal: tanggal,
          jam_mulai: jam,
          toleransi: toleransi,
          dibuat_oleh: currentUser,
          waktu_dibuat: firebase.firestore.FieldValue.serverTimestamp()
        });

        let payload = { action: "buatJadwal", idKegiatan: idKegiatan, jenisKegiatan: jenis, tanggal: tanggal, jam: jam, toleransi: toleransi };

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .catch(err => console.log("GSheets Backup error: ", err)); 

        document.getElementById('qrKegiatanImg').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + idKegiatan;
        document.getElementById('labelKegiatan').innerText = jenis + " (" + idKegiatan + ")";
        document.getElementById('judulQR').innerText = "QR Kegiatan Baru Aktif";
        
        document.getElementById('areaQR').classList.remove('hidden');
        document.getElementById('areaQR').classList.add('flex');
        
        btn.innerHTML = `Buat & Munculkan QR`;
        btn.disabled = false;
        
        Swal.fire({
          icon: 'success', title: 'Jadwal Siap!',
          text: 'QR Code kegiatan sudah aktif dan tersimpan di database.',
          confirmButtonColor: '#059669', timer: 2000
        });

      } catch (error) {
        btn.innerHTML = `Buat & Munculkan QR`; btn.disabled = false;
        Swal.fire({ icon: 'error', title: 'Gagal', text: error.message });
      }
    }

    function logout() {
      localStorage.clear();
      auth.signOut().then(() => { window.location.href = "index.html"; });
    }
  </script>
</body>
</html>
