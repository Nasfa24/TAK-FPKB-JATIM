<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laporan Kinerja - TAK FPKB</title>
  <meta name="theme-color" content="#059669">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen pb-10 flex flex-col">

  <div class="bg-pkb text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10">
    <button onclick="window.location.href='dashboard_tak.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold">Laporan Kinerja</h1>
  </div>

  <div class="px-4 mt-6">
    <div class="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-pkb">
      <form id="formLaporan" onsubmit="kirimLaporan(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Bulan Laporan</label>
          <input type="month" id="bulanLaporan" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">File Laporan (PDF/Gambar)</label>
          <input type="file" id="fileLaporan" accept=".pdf,image/*" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm">
        </div>
        <button type="submit" id="btnSubmit" class="w-full bg-pkb text-white font-bold py-3 rounded-lg hover:bg-pkb-dark transition flex justify-center items-center">
          Unggah Laporan
        </button>
      </form>
      
      <div class="bg-blue-50 border border-blue-200 p-3 rounded-lg mt-5 w-full">
        <p class="text-xs text-blue-800 font-semibold text-center"><span class="font-bold">Info Kedisiplinan:</span> Batas akhir unggah Laporan Kinerja Digital adalah <span class="font-bold underline">tanggal 5 bulan berikutnya</span>. Jika lewat dari itu, status Anda akan tercatat "Terlambat".</p>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // URL API GOOGLE APPS SCRIPT ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxFMGDcYC1_C6z9nojL1IykVxFQsN7FJDVpi0twn2skuOsHPmC2lpuhkAa5ieLyYi-5/exec";

    let currentUser = localStorage.getItem('tak_username');
    let currentNama = localStorage.getItem('tak_nama');
    if (!currentUser) { window.location.href = "index.html"; }

    // Fungsi konversi nama bulan
    function formatNamaBulan(yyyy_mm) {
      const namaBulan = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
      let parts = yyyy_mm.split("-");
      let idx = parseInt(parts[1]) - 1;
      return namaBulan[idx] + " " + parts[0];
    }

    // Fungsi pembungkus file ke Base64
    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function kirimLaporan(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      const bulanValue = document.getElementById('bulanLaporan').value; 
      const fileInput = document.getElementById('fileLaporan').files[0];
      
      if (!fileInput) return;

      // Batasan ukuran file (misal maksimal 5MB)
      if (fileInput.size > 5 * 1024 * 1024) {
        Swal.fire('Terlalu Besar', 'Maksimal ukuran file laporan adalah 5MB.', 'error');
        return;
      }

      btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Mengirim ke GDrive...`;
      btn.disabled = true;

      try {
        // 1. Ambil No Kontrak dari Firestore
        let userDoc = await db.collection("Users").doc(currentUser).get();
        let noKontrak = userDoc.exists && userDoc.data().no_kontrak ? userDoc.data().no_kontrak : "0000";

        // 2. Ubah File & Format Nama
        let base64Data = await getBase64(fileInput);
        let namaBulanFormat = formatNamaBulan(bulanValue); // cth: MARET 2026

        let payload = {
          action: "uploadLaporan",
          base64: base64Data,
          mimeType: fileInput.type,
          fileName: fileInput.name,
          noKontrak: noKontrak,
          namaLengkap: currentNama,
          bulanTahunNama: namaBulanFormat
        };

        // 3. Tembakkan ke Google Apps Script (GDrive)
        let response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        let gasResult = await response.json();
        
        if (gasResult.status !== "success") {
          throw new Error(gasResult.message);
        }

        // ========================================================
        // 4. LOGIKA KETERLAMBATAN (TANGGAL 5 BULAN BERIKUTNYA)
        // ========================================================
        let parts = bulanValue.split("-"); // misal "2026-03"
        let tahunLaporan = parseInt(parts[0]);
        let bulanLaporan = parseInt(parts[1]); 

        // Deadline adalah tanggal 5 bulan BERIKUTNYA.
        // Jika laporannya Desember (12), maka deadlinenya Januari tahun depannya.
        let deadlineTahun = bulanLaporan === 12 ? tahunLaporan + 1 : tahunLaporan;
        let deadlineBulan = bulanLaporan === 12 ? 0 : bulanLaporan; // 0 karena indeks bulan Date() JavaScript mulai dari 0 (Jan=0, Feb=1, dst)
        
        // Buat objek waktu Batas Akhir: Tgl 5, Jam 23:59:59
        let batasAkhir = new Date(deadlineTahun, deadlineBulan, 5, 23, 59, 59); 
        let waktuUpload = new Date(); // Waktu saat TAK pencet tombol upload

        let statusDigital = "Tepat Waktu";
        let poinDapat = 5;

        // Jika waktu upload lebih besar (lebih lambat) dari batas akhir, maka Telat
        if (waktuUpload > batasAkhir) {
            statusDigital = "Terlambat";
            poinDapat = 0; // Jika terlambat poin hangus
        }

        let idLaporan = "LAP-" + new Date().getTime();

        // 5. Catat Jejaknya di Firestore Database
        await db.collection("Laporan_Kinerja").doc(idLaporan).set({
          id_laporan: idLaporan,
          bulan_tahun: bulanValue, // YYYY-MM
          username: currentUser,
          nama: currentNama,
          waktu_upload: firebase.firestore.FieldValue.serverTimestamp(),
          file_url: gasResult.fileUrl,
          nama_file: gasResult.namaFile,
          status_digital: statusDigital,
          status_diterima: "Belum Diterima",
          poin: poinDapat
        });

        Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Laporan tersimpan di Folder GDrive.', confirmButtonColor: '#059669' })
        .then(() => { window.location.href = 'dashboard_tak.html'; });

      } catch (error) {
        btn.innerHTML = `Unggah Laporan`; btn.disabled = false;
        Swal.fire({ icon: 'error', title: 'Gagal', text: error.message });
      }
    }
  </script>
</body>
</html>
