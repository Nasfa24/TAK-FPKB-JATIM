<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rekap Absensi - Koordinator FPKB</title>
  <meta name="theme-color" content="#059669">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 flex flex-col">

  <div class="bg-gray-800 text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10 border-b-4 border-purple-500">
    <button onclick="window.location.href='dashboard_koordinator.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold text-purple-400">Rekap Data Kehadiran</h1>
  </div>

  <div class="px-4 mt-6">
    <div class="bg-white rounded-2xl shadow-md p-5 border-t-4 border-purple-500 mb-4">
      <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Pilih Agenda Kegiatan</label>
      <select id="pilihKegiatan" onchange="muatRekap()" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none text-sm font-bold text-gray-700 bg-gray-50">
        <option value="">Memuat daftar kegiatan...</option>
      </select>
    </div>

    <div id="boxStatistik" class="grid grid-cols-3 gap-3 mb-6 hidden">
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-center shadow-sm">
        <p class="text-[10px] text-blue-600 font-bold uppercase mb-1">Total Hadir</p>
        <p id="statTotal" class="text-2xl font-black text-blue-700">0</p>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-xl p-3 text-center shadow-sm">
        <p class="text-[10px] text-green-600 font-bold uppercase mb-1">Tepat Waktu</p>
        <p id="statTepat" class="text-2xl font-black text-green-700">0</p>
      </div>
      <div class="bg-red-50 border border-red-200 rounded-xl p-3 text-center shadow-sm">
        <p class="text-[10px] text-red-600 font-bold uppercase mb-1">Terlambat</p>
        <p id="statTelat" class="text-2xl font-black text-red-700">0</p>
      </div>
    </div>

    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="font-bold text-gray-700 text-sm">Rincian Kehadiran TAK</h2>
    </div>

    <div id="listRekap" class="space-y-3">
      <div class="text-center text-gray-500 text-sm py-10 bg-white rounded-xl shadow-sm border border-gray-200">Silakan pilih kegiatan di atas.</div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = localStorage.getItem('tak_username');
    let currentRole = localStorage.getItem('tak_role') || "";
    if (!currentUser || !currentRole.toLowerCase().includes('koordinator')) { window.location.href = "index.html"; }

    // MUAT DAFTAR KEGIATAN KE DROPDOWN
    document.addEventListener("DOMContentLoaded", async function() {
      let selectBox = document.getElementById('pilihKegiatan');
      try {
        let snapshot = await db.collection("Jadwal_Kegiatan").orderBy("waktu_dibuat", "desc").limit(20).get();
        selectBox.innerHTML = '<option value="">-- Pilih Kegiatan --</option>';
        
        snapshot.forEach(doc => {
          let data = doc.data();
          let opt = document.createElement('option');
          opt.value = data.id_kegiatan;
          opt.text = `${data.tanggal} | ${data.jenis_kegiatan}`;
          selectBox.appendChild(opt);
        });
      } catch(e) {
        selectBox.innerHTML = '<option value="">Gagal memuat kegiatan</option>';
      }
    });

    // FUNGSI UTAMA: MENARIK DATA ABSENSI BERDASARKAN KEGIATAN
    async function muatRekap() {
      let idKegiatan = document.getElementById('pilihKegiatan').value;
      let listContainer = document.getElementById('listRekap');
      let boxStatistik = document.getElementById('boxStatistik');

      if(!idKegiatan) {
        boxStatistik.classList.add('hidden');
        listContainer.innerHTML = `<div class="text-center text-gray-500 text-sm py-10 bg-white rounded-xl shadow-sm border border-gray-200">Silakan pilih kegiatan di atas.</div>`;
        return;
      }

      listContainer.innerHTML = `<div class="text-center text-gray-500 text-sm py-10">Mengambil data dari server...</div>`;
      
      try {
        // Ambil data user untuk mapping nama lengkap (karena di Absensi hanya ada username)
        let usersSnapshot = await db.collection("Users").get();
        let mapNama = {};
        usersSnapshot.forEach(u => { mapNama[u.id] = u.data().nama; });

        // Ambil data absensi sesuai ID Kegiatan
        let absenSnapshot = await db.collection("Absensi")
                                   .where("id_kegiatan", "==", idKegiatan)
                                   .orderBy("waktu_scan", "asc")
                                   .get();

        if (absenSnapshot.empty) {
          boxStatistik.classList.add('hidden');
          listContainer.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow text-center border border-gray-200"><p class="text-gray-500 font-bold text-sm">Belum ada TAK yang absen di kegiatan ini.</p></div>`;
          return;
        }

        let totalHadir = 0;
        let totalTepat = 0;
        let totalTelat = 0;
        let htmlList = "";

        absenSnapshot.forEach(doc => {
          let data = doc.data();
          totalHadir++;

          // Tentukan apakah dia telat atau tepat waktu dari statusnya
          let isTelat = data.status.toLowerCase().includes("telat");
          if (isTelat) { totalTelat++; } else { totalTepat++; }

          let warnaKiri = isTelat ? "border-red-500" : "border-green-500";
          let warnaBadge = isTelat ? "bg-red-100 text-red-700" : "bg-green-100 text-green-700";
          
          let namaLengkap = mapNama[data.username] || data.username;
          let jamScan = data.waktu_scan ? data.waktu_scan.toDate().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', second:'2-digit'}) : "-";

          htmlList += `
            <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 ${warnaKiri} flex justify-between items-center">
              <div>
                <p class="font-bold text-gray-800 text-sm mb-1">${namaLengkap}</p>
                <div class="flex items-center gap-2">
                  <span class="text-xs font-bold text-gray-400 border border-gray-200 px-2 py-0.5 rounded flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ${jamScan}
                  </span>
                  <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase ${warnaBadge}">${data.status}</span>
                </div>
              </div>
              <div class="text-right">
                <p class="text-xl font-black text-pkb">+${data.poin_didapat}</p>
                <p class="text-[9px] text-gray-400 font-bold uppercase">Poin</p>
              </div>
            </div>
          `;
        });

        // Tampilkan Statistik
        document.getElementById('statTotal').innerText = totalHadir;
        document.getElementById('statTepat').innerText = totalTepat;
        document.getElementById('statTelat').innerText = totalTelat;
        boxStatistik.classList.remove('hidden');

        // Tampilkan List
        listContainer.innerHTML = htmlList;

      } catch (error) {
        boxStatistik.classList.add('hidden');
        listContainer.innerHTML = `<div class="text-center text-red-500 font-bold text-sm">Gagal memuat data: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
