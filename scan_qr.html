<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Absensi - TAK FPKB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-100 min-h-screen pb-10 flex flex-col">

  <div class="bg-pkb text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10 border-b-4 border-pkb-dark">
    <button onclick="kembali()" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition shadow-sm">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold">Scan QR Koordinator</h1>
  </div>

  <div class="flex-grow px-4 mt-6 flex flex-col items-center">
    
    <div id="boxScanner" class="bg-white w-full max-w-md rounded-2xl shadow-lg p-5 border-t-4 border-pkb flex-col items-center relative flex">
      <p class="text-center text-sm font-semibold text-gray-600 mb-4 px-2">Arahkan kamera ke QR Code milik Koordinator. Pastikan Anda absen sesuai jadwal.</p>
      
      <div id="reader" class="w-full h-64 rounded-xl overflow-hidden border-[3px] border-pkb bg-black flex items-center justify-center shadow-inner relative">
        <div class="absolute w-full h-1 bg-green-400 opacity-70 animate-[scan_2s_ease-in-out_infinite]"></div>
      </div>
      
      <button onclick="kembali()" class="mt-5 w-full bg-red-50 text-red-600 font-bold py-2 rounded-lg border border-red-200 hover:bg-red-100 transition">
        Batalkan Scan
      </button>
    </div>

  </div>

  <style>
    @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
  </style>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = localStorage.getItem('tak_username');
    if (!currentUser) { window.location.href = "index.html"; }

    let html5QrCode; 

    // OTOMATIS NYALAKAN KAMERA SAAT HALAMAN DIBUKA
    document.addEventListener("DOMContentLoaded", function() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" }, // Paksa pakai kamera belakang HP
        { fps: 10, qrbox: { width: 220, height: 220 } },
        onScanSuccess
      ).catch((err) => {
        Swal.fire({
          icon: 'error', title: 'Kamera Diblokir',
          text: 'Gagal mengakses kamera. Pastikan browser Anda mengizinkan akses kamera dan aplikasi dibuka via HTTPS.',
          confirmButtonColor: '#059669'
        });
      });
    });

    // KETIKA KAMERA BERHASIL MEMBACA QR
    async function onScanSuccess(decodedText) {
      if(html5QrCode) {
        html5QrCode.stop().then(() => html5QrCode.clear()).catch(e => console.log(e)); // Matikan total
      }
      
      Swal.fire({ title: 'Memeriksa Jadwal...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

      try {
        let jadwalDoc = await db.collection("Jadwal_Kegiatan").doc(decodedText).get();
        if (!jadwalDoc.exists) throw new Error("QR Code tidak dikenali atau acara tidak terdaftar di sistem.");
        
        let jadwal = jadwalDoc.data();
        
        let jamStr = jadwal.jam_mulai;
        if(jamStr.length <= 5) jamStr += ":00"; 
        let waktuMulai = new Date(`${jadwal.tanggal}T${jamStr}`);
        let now = new Date(); 

        let waktuBuka = new Date(waktuMulai.getTime() - 15 * 60000); 
        let waktuTutup = new Date(waktuMulai.getTime() + 3 * 60 * 60000); 

        if (now < waktuBuka) {
          let jamBukaFormat = waktuBuka.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
          throw new Error(`Absensi belum dibuka! Silakan scan kembali pada pukul ${jamBukaFormat} WIB.`);
        }
        
        if (now > waktuTutup) {
          throw new Error("Sesi absensi telah ditutup. Masa berlaku QR untuk kegiatan ini sudah expired.");
        }

        let cekAbsen = await db.collection("Absensi").where("id_kegiatan", "==", decodedText).where("username", "==", currentUser).get();
        if (!cekAbsen.empty) throw new Error("Anda sudah melakukan absensi untuk kegiatan ini.");

        Swal.fire({ title: 'Menghitung Poin...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

        let toleransiMenit = 15; 
        let batasAman = new Date(waktuMulai.getTime() + toleransiMenit * 60000);
        
        let poinDasar = (jadwal.jenis_kegiatan.toLowerCase().includes("upgrading")) ? 7 : 5;
        let dendaPoin = 0;
        let statusHadir = "Hadir (Tepat Waktu)";

        if (now > batasAman) {
          let selisihMenit = Math.ceil((now - batasAman) / 60000);
          let blokTelat = Math.ceil(selisihMenit / 15); 
          dendaPoin = blokTelat * 2; 
          statusHadir = `Hadir (Telat ${selisihMenit} menit)`;
        }

        let poinNet = poinDasar - dendaPoin;

        let batch = db.batch();
        let refAbsen = db.collection("Absensi").doc();
        batch.set(refAbsen, {
          id_absensi: "ABS-" + now.getTime(), id_kegiatan: decodedText, jenis_kegiatan: jadwal.jenis_kegiatan,
          username: currentUser, waktu_scan: firebase.firestore.FieldValue.serverTimestamp(), status: statusHadir, poin_didapat: poinNet
        });

        let refUser = db.collection("Users").doc(currentUser);
        let userDocInfo = await refUser.get();
        let poinLama = userDocInfo.exists && userDocInfo.data().poin ? parseInt(userDocInfo.data().poin) : 0;
        let poinBaru = poinLama + poinNet;
        batch.update(refUser, { poin: poinBaru });

        await batch.commit();

        let msg = `Absensi Berhasil! Poin Dasar +${poinDasar}.`;
        if (dendaPoin > 0) { msg += ` Namun Anda terkena penalti keterlambatan -${dendaPoin} poin. Total ditambahkan: ${poinNet} Poin.`; }

        localStorage.setItem('tak_poin', poinBaru);

        Swal.fire({ icon: 'success', title: statusHadir, text: msg, confirmButtonColor: '#059669' })
        .then(() => { kembali(); });

      } catch (error) {
        Swal.fire({ icon: 'error', title: 'Ditolak', text: error.message, confirmButtonColor: '#d33' })
        .then(() => { kembali(); }); // Jika gagal, kembalikan ke dashboard agar user bisa coba lagi
      }
    }

    function kembali() {
      if(html5QrCode) { html5QrCode.stop().catch(e => console.log(e)); }
      let role = localStorage.getItem('tak_role') || "";
      let dest = role.toLowerCase().includes('koordinator') ? 'dashboard_koordinator.html' : 'dashboard_tak.html';
      window.location.href = dest;
    }
  </script>
</body>
</html>
