<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pengajuan Izin - TAK FPKB</title>
  <meta name="theme-color" content="#059669">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen pb-10 flex flex-col">

  <div class="bg-pkb text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10">
    <button onclick="window.location.href='dashboard_tak.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold">Pengajuan Izin</h1>
  </div>

  <div class="px-4 mt-6">
    
    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg mb-6 shadow-sm">
      <p class="text-xs text-blue-800 font-semibold leading-relaxed">
        <span class="font-bold uppercase tracking-widest text-[10px] block mb-1">Ketentuan Izin:</span>
        Pastikan Anda melampirkan <span class="font-bold underline">Surat Keterangan Dokter / Bukti Pendukung</span> yang sah. Pengajuan tanpa bukti kuat berpotensi ditolak oleh Koordinator.
      </p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-pkb relative overflow-hidden mb-8">
      <div class="absolute top-0 right-0 bg-yellow-100 text-yellow-700 text-[9px] px-3 py-1 font-bold rounded-bl-lg uppercase">Validasi Manual</div>
      
      <form id="formIzin" onsubmit="kirimIzin(event)">
        <div class="mb-4">
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Kegiatan yang Diizinkan</label>
          <select id="inputKegiatan" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm font-semibold text-gray-700 bg-gray-50">
            <option value="">-- Memuat Agenda Terbaru... --</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Alasan Berhalangan Hadir</label>
          <textarea id="inputAlasan" required rows="3" placeholder="Contoh: Sakit tipes (surat dokter terlampir) atau Dinas Luar Kota dari Instansi..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb outline-none text-sm resize-none"></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Lampiran Bukti (Foto/PDF)</label>
          <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50 transition cursor-pointer relative">
            <input type="file" id="fileBukti" accept=".pdf,image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <svg class="mx-auto h-8 w-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
            <p class="text-xs text-gray-500 font-semibold" id="namaFileTxt">Klik/Tap untuk memilih Bukti</p>
          </div>
        </div>

        <button type="submit" id="btnSubmit" class="w-full bg-pkb text-white font-bold py-3 rounded-lg shadow-md hover:bg-pkb-dark transition flex justify-center items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          Ajukan Izin Sekarang
        </button>
      </form>
    </div>

    <h3 class="font-bold text-gray-800 text-sm mb-3 px-1 border-b-2 border-gray-200 pb-2 flex justify-between items-center">
      Riwayat Izin Saya
      <span class="text-[10px] bg-gray-200 text-gray-600 px-2 py-1 rounded">Live Update</span>
    </h3>
    
    <div id="listRiwayatIzin" class="space-y-3">
      <div class="text-center text-gray-500 text-sm py-10 bg-white rounded-xl shadow-sm border border-gray-200">Memuat Riwayat...</div>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // API GOOGLE APPS SCRIPT ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxFMGDcYC1_C6z9nojL1IykVxFQsN7FJDVpi0twn2skuOsHPmC2lpuhkAa5ieLyYi-5/exec";

    let currentUser = localStorage.getItem('tak_username');
    let currentNama = localStorage.getItem('tak_nama');
    if (!currentUser) { window.location.href = "index.html"; }

    document.addEventListener("DOMContentLoaded", async () => {
      // 1. Tangkap perubahan file input
      document.getElementById('fileBukti').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
          document.getElementById('namaFileTxt').innerText = e.target.files[0].name;
          document.getElementById('namaFileTxt').classList.add('text-pkb');
        }
      });

      // 2. Tarik Agenda Terakhir untuk dipilih TAK
      await loadAgendaTerbaru();

      // 3. Pasang Mata Dewa (Realtime Listener) untuk Riwayat Izin Pribadi
      pantauRiwayatIzin();
    });

    async function loadAgendaTerbaru() {
      let selectKegiatan = document.getElementById('inputKegiatan');
      try {
        // Tarik 5 kegiatan terakhir yang masih Aktif/Ditunda
        let snapshot = await db.collection("Jadwal_Kegiatan")
                               .orderBy("waktu_dibuat", "desc")
                               .limit(5)
                               .get();
        
        selectKegiatan.innerHTML = "";
        if(snapshot.empty) {
          selectKegiatan.innerHTML = `<option value="">-- Belum Ada Agenda Tersedia --</option>`;
          return;
        }

        selectKegiatan.innerHTML = `<option value="">-- Pilih Kegiatan --</option>`;
        snapshot.forEach(doc => {
          let data = doc.data();
          let tanggalStr = data.tanggal.split("-").reverse().join("/"); // DD/MM/YYYY
          // Boleh ajukan izin selama kegiatan belum ditutup
          if(data.status !== "Ditutup") {
            selectKegiatan.innerHTML += `<option value="${data.jenis_kegiatan} (${tanggalStr})">${data.jenis_kegiatan} - ${tanggalStr}</option>`;
          }
        });
      } catch (error) {
        selectKegiatan.innerHTML = `<option value="">-- Gagal memuat agenda --</option>`;
      }
    }

    function pantauRiwayatIzin() {
      db.collection("Izin")
        .where("username", "==", currentUser)
        .orderBy("waktu_pengajuan", "desc")
        .onSnapshot((snapshot) => {
          let listContainer = document.getElementById('listRiwayatIzin');
          let htmlData = "";

          if (snapshot.empty) {
            listContainer.innerHTML = `<div class="bg-white p-6 rounded-xl shadow-sm text-center border border-gray-200"><p class="text-gray-400 font-bold text-xs uppercase tracking-widest">Belum ada riwayat izin</p></div>`;
            return;
          }

          snapshot.forEach(doc => {
            let data = doc.data();
            let tglPengajuan = data.waktu_pengajuan ? data.waktu_pengajuan.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : "Baru Saja";
            
            let statusWarna = "bg-yellow-100 text-yellow-700"; // Default Pending
            let borderColor = "border-yellow-400";
            if (data.status === "Diterima") { statusWarna = "bg-green-100 text-green-700"; borderColor = "border-pkb"; }
            else if (data.status === "Ditolak") { statusWarna = "bg-red-100 text-red-700"; borderColor = "border-red-500"; }

            htmlData += `
              <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 ${borderColor} flex justify-between items-center">
                <div>
                  <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">${tglPengajuan}</p>
                  <p class="font-bold text-gray-800 text-sm leading-tight">${data.kegiatan}</p>
                </div>
                <div class="text-right">
                  <span class="text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest ${statusWarna}">${data.status}</span>
                </div>
              </div>
            `;
          });
          listContainer.innerHTML = htmlData;
        }, (error) => {
          console.log("Error mengambil riwayat izin:", error);
        });
    }

    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function kirimIzin(e) {
      e.preventDefault();
      
      const kegiatan = document.getElementById('inputKegiatan').value;
      const alasan = document.getElementById('inputAlasan').value;
      const fileInput = document.getElementById('fileBukti').files[0];
      const btn = document.getElementById('btnSubmit');

      if (!kegiatan) { Swal.fire('Oops', 'Pilih kegiatan yang ingin dimintakan izin.', 'warning'); return; }
      if (!fileInput) { Swal.fire('Oops', 'Wajib melampirkan foto bukti!', 'warning'); return; }
      if (fileInput.size > 5 * 1024 * 1024) { Swal.fire('File Terlalu Besar', 'Maksimal ukuran file bukti adalah 5MB.', 'error'); return; }

      btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Mengirim ke Pusat...`;
      btn.disabled = true;

      try {
        let base64Data = await getBase64(fileInput);

        let payloadFile = {
          action: "uploadIzin",
          base64: base64Data,
          mimeType: fileInput.type,
          fileName: fileInput.name,
          namaLengkap: currentNama,
          kegiatan: kegiatan
        };

        let response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payloadFile) });
        let gasResult = await response.json();

        // PENANGKAL ERROR DRIVEAPP
        if (gasResult.status !== "success") {
             if (gasResult.message && gasResult.message.includes("DriveApp")) {
                 console.log("File terupload, tapi akses ditolak Google. Mengabaikan error.");
             } else {
                 throw new Error(gasResult.message || "Gagal menghubungi server Google.");
             }
        }
        
        let linkBerkas = gasResult.fileUrl || "Lihat Langsung di Folder Izin GDrive";

        // Catat di Firebase untuk Antrean Validasi Koordinator
        let idIzin = "IZIN-" + new Date().getTime();
        await db.collection("Izin").doc(idIzin).set({
          id_izin: idIzin,
          username: currentUser,
          nama: currentNama,
          kegiatan: kegiatan,
          alasan: alasan,
          file_url: linkBerkas,
          waktu_pengajuan: firebase.firestore.FieldValue.serverTimestamp(),
          status: "Pending" // Menunggu keputusan koordinator
        });

        Swal.fire({
          icon: 'success', title: 'Izin Terkirim!',
          text: 'Surat Izin Anda sedang ditinjau oleh Koordinator.',
          confirmButtonColor: '#059669'
        });

        // Reset form
        document.getElementById('formIzin').reset();
        document.getElementById('namaFileTxt').innerText = "Klik/Tap untuk memilih Bukti";
        document.getElementById('namaFileTxt').classList.remove('text-pkb');

      } catch (error) {
        Swal.fire('Gagal Mengirim', error.message, 'error');
      } finally {
        btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg> Ajukan Izin Sekarang`;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
