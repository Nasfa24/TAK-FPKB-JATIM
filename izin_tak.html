<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pengajuan Izin - TAK FPKB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen pb-10 flex flex-col">

  <div class="bg-pkb text-white pt-6 pb-6 px-4 shadow-md flex items-center gap-4 relative z-10">
    <button onclick="window.location.href='dashboard_tak.html'" class="bg-white/20 p-2 rounded-full hover:bg-white/30 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <h1 class="text-lg font-bold">Pengajuan Izin</h1>
  </div>

  <div class="px-4 mt-6">
    <div class="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-red-500">
      <form id="formIzin" onsubmit="ajukanIzin(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Kegiatan</label>
          <input type="text" id="namaKegiatan" placeholder="Contoh: Rapat Paripurna" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Alasan Izin</label>
          <textarea id="alasanIzin" rows="3" placeholder="Sakit / Ada Kepentingan Keluarga..." required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none"></textarea>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Bukti Izin (Surat/Foto)</label>
          <input type="file" id="fileIzin" accept=".pdf,image/*" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm">
        </div>
        <button type="submit" id="btnSubmit" class="w-full bg-red-500 text-white font-bold py-3 rounded-lg hover:bg-red-600 transition flex justify-center items-center">
          Kirim Pengajuan
        </button>
      </form>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // URL API GOOGLE APPS SCRIPT ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxFMGDcYC1_C6z9nojL1IykVxFQsN7FJDVpi0twn2skuOsHPmC2lpuhkAa5ieLyYi-5/exec";

    let currentUser = localStorage.getItem('tak_username');
    let currentNama = localStorage.getItem('tak_nama');
    if (!currentUser) { window.location.href = "index.html"; }

    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
      });
    }

    async function ajukanIzin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      const kegiatan = document.getElementById('namaKegiatan').value.trim();
      const alasan = document.getElementById('alasanIzin').value.trim();
      const fileInput = document.getElementById('fileIzin').files[0];
      
      if (!fileInput) return;

      btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Mengirim ke GDrive...`;
      btn.disabled = true;

      try {
        let base64Data = await getBase64(fileInput);

        let payload = {
          action: "uploadIzin",
          base64: base64Data,
          mimeType: fileInput.type,
          fileName: fileInput.name,
          namaLengkap: currentNama,
          kegiatan: kegiatan
        };

        // Tembakkan ke Google Apps Script (GDrive)
        let response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        let gasResult = await response.json();
        
        if (gasResult.status !== "success") {
          throw new Error(gasResult.message);
        }

        // Catat di Firestore Database
        await db.collection("Izin").add({
          waktu_pengajuan: firebase.firestore.FieldValue.serverTimestamp(),
          username: currentUser,
          nama: currentNama,
          kegiatan: kegiatan,
          alasan: alasan,
          file_url: gasResult.fileUrl,
          nama_file: gasResult.namaFile,
          status: "Pending"
        });

        Swal.fire({ icon: 'success', title: 'Terkirim', text: 'Pengajuan izin berhasil masuk ke GDrive.', confirmButtonColor: '#059669' })
        .then(() => { window.location.href = 'dashboard_tak.html'; });

      } catch (error) {
        btn.innerHTML = `Kirim Pengajuan`; btn.disabled = false;
        Swal.fire({ icon: 'error', title: 'Gagal', text: error.message });
      }
    }
  </script>
</body>
</html>
