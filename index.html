<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - TAK FPKB Jatim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    tailwind.config = { theme: { extend: { colors: { pkb: { light: '#34d399', DEFAULT: '#059669', dark: '#047857' } } } } }
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm mx-4 border-t-4 border-pkb">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Tenaga Ahli Kedewanan</h1>
      <p class="text-sm text-gray-500">FPKB DPRD Provinsi Jawa Timur</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb focus:border-pkb outline-none transition">
      </div>
      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pkb focus:border-pkb outline-none transition">
      </div>
      <button type="submit" id="btnSubmit" class="w-full bg-pkb text-white font-semibold py-2 px-4 rounded-lg hover:bg-pkb-dark transition duration-200 flex justify-center items-center">
        <span>Masuk</span>
      </button>
    </form>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeiiF06uIkuRJuEELSORGYriC4LZIWAzo",
      authDomain: "apps-tak-fpkb.firebaseapp.com",
      projectId: "apps-tak-fpkb",
      storageBucket: "apps-tak-fpkb.firebasestorage.app",
      messagingSenderId: "370368024191",
      appId: "1:370368024191:web:ece099f60a9064a968394a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // CEK SESI (Jika user sudah pernah login dan belum logout)
    document.addEventListener("DOMContentLoaded", function() {
      let savedUser = localStorage.getItem('tak_username');
      let savedRole = localStorage.getItem('tak_role');
      
      if (savedUser) {
        let role = (savedRole || "").toLowerCase();
        let dest = 'dashboard_tak.html'; // Default ke TAK
        
        if (role.includes('koordinator')) {
          dest = 'dashboard_koordinator.html';
        } else if (role.includes('bendahara')) {
          dest = 'dashboard_bendahara.html';
        }
        
        window.location.href = dest;
      }
    });

    function handleLogin(event) {
      event.preventDefault(); 
      const btn = document.getElementById('btnSubmit');
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      
      const emailFirebase = user + "@tak.fpkb.id";

      btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses...`;
      btn.disabled = true;

      auth.signInWithEmailAndPassword(emailFirebase, pass)
        .then((userCredential) => {
          return db.collection("Users").doc(user).get();
        })
        .then((doc) => {
          if (doc.exists) {
            let userData = doc.data();
            
            localStorage.setItem('tak_username', userData.username);
            localStorage.setItem('tak_role', userData.role);
            localStorage.setItem('tak_nama', userData.nama);
            localStorage.setItem('tak_dewan', userData.dewan);
            localStorage.setItem('tak_poin', userData.poin);

            btn.innerHTML = `Mengalihkan...`;
            
            // LOGIKA PENGALIHAN BERDASARKAN ROLE
            let role = (userData.role || "").toString().toLowerCase();
            let dest = 'dashboard_tak.html'; // Default ke TAK
            
            if (role.includes('koordinator')) {
              dest = 'dashboard_koordinator.html';
            } else if (role.includes('bendahara')) {
              dest = 'dashboard_bendahara.html';
            }
            
            window.location.href = dest;

          } else {
            throw new Error("Data Profil tidak ditemukan di Database.");
          }
        })
        .catch((error) => {
          btn.innerHTML = `Masuk`; btn.disabled = false;
          let errorMsg = "Username atau Password salah!";
          if (error.code === 'auth/network-request-failed') errorMsg = "Koneksi internet terputus.";
          
          Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: errorMsg, confirmButtonColor: '#059669' });
        });
    }
  </script>
</body>
</html>
